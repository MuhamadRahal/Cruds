<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
	<link rel="stylesheet" href="css4.css">
    <title>بوابة الشرق الأوسط</title>
</head>
<body>
    <div class="crud">
        <div class="head">
            <h2>crud</h2>
            <p>porduct management system</p>
        </div>
        <div class="input">
            <input id="title" type="text" placeholder="Title">
            <div class="price">
                <input class="inp" id="price" type="number" placeholder="Price">
                <input class="inp" id="Taxis" type="number" placeholder="Taxis">
                <input class="inp" id="Ads" type="number" placeholder="Ads">
                <input class="inp" id="Discount" type="number" placeholder="Discount">
                <small id="total">1233</small>
            </div>
            <input id="count" type="number" placeholder="Count">
            <input id="Category" type="text" placeholder="Category">
            <button id="btn">Creat</button>
        </div>



        <div class="output">
            <div class="search">
                <input onkeyup="searchData(this.value)" id="search" type="text" placeholder="Search">
                <div class="btnSearch">
                    <button onclick="getSearch(this.id)" class="search" id="by-title">Search By title</button>
                    <button onclick="getSearch(this.id)" class="search" id="by-category">Search By Category</button>
                </div>
            </div>
         <div>
    <div id="DeleteAll"></div>
    
    <table>
        <tr>
            <th>id</th>
            <th>title</th>
            <th>price</th>
            <th>taxis</th>
            <th>ads</th>
            <th>Discount</th>
            <th>total</th>
            <th>category</th>
            <th>update</th>
            <th>delete</th>
        </tr>
        <tbody id="tbody"></tbody>
    </table>
</div>
	<script src="js4.js"></script>
</body>
</html>
